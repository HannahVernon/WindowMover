name: Build and Release

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]

permissions:
  contents: write

jobs:
  prepare:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest version tag
        id: tag
        run: |
          git fetch --tags
          tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$tag" ]; then
            echo "::error::No version tag found"
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building release for $tag (version $version)"

  build:
    needs: prepare
    runs-on: windows-latest

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish src/WindowMover/WindowMover.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish/WindowMover
          -p:PublishSingleFile=false

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DMyAppVersion=${{ needs.prepare.outputs.version }}
          installer\WindowMover.iss

      - name: Create portable zip
        run: Compress-Archive -Path ./publish/WindowMover/* -DestinationPath ./WindowMover-win-x64-${{ needs.prepare.outputs.version }}.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowMover-Setup
          path: ./dist/WindowMover-Setup-${{ needs.prepare.outputs.version }}.exe

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowMover-Portable
          path: ./WindowMover-win-x64-${{ needs.prepare.outputs.version }}.zip

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "Release ${{ needs.prepare.outputs.tag }}"
          body: |
            ## WindowMover ${{ needs.prepare.outputs.tag }}

            ### Downloads

            | Type | File |
            |------|------|
            | Installer | `WindowMover-Setup-${{ needs.prepare.outputs.version }}.exe` |
            | Portable | `WindowMover-win-x64-${{ needs.prepare.outputs.version }}.zip` |

            The installer includes auto-start on login and uninstall support.
            The portable zip is self-contained (no .NET runtime required).
          files: ./artifacts/**/*
          draft: false
          prerelease: false
